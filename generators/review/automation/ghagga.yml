# GHAGGA Code Review — GitHub Actions workflow
# Generated by javi-forge / generator.review.automation
#
# Source: https://github.com/JNZader/ghagga
# Usage:  forge-init.sh --generator generator.review.automation --project-name <name>
#
# This workflow runs AI-powered multi-agent code review on every pull request.
# It uses the ghagga GitHub Action with GitHub Models as the default free provider.
# Override provider and mode via repository secrets or a .ghagga.json config file.
#
# To customize:
#   - Set GHAGGA_API_KEY secret for a non-GitHub provider
#   - Set GHAGGA_PROVIDER to: anthropic | openai | google | github | ollama | qwen
#   - Set GHAGGA_MODEL to pin a specific model
#   - Add a .ghagga.json in the repo root for project-level defaults
#   - Set continue-on-error: true below for advisory (non-blocking) reviews

name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run GHAGGA Review
        uses: JNZader/ghagga@v1
        with:
          # Provider: github uses GitHub Models (free for public repos, no key needed)
          # Alternatives: anthropic, openai, google, ollama, qwen
          provider: ${{ vars.GHAGGA_PROVIDER || 'github' }}
          # mode: simple (fast) | workflow (thorough) | consensus (high-confidence)
          mode: simple
          # api-key: set as repository secret GHAGGA_API_KEY for paid providers
          api-key: ${{ secrets.GHAGGA_API_KEY }}
          # github-token: auto-provided, no setup needed
          github-token: ${{ github.token }}
          # enable-memory: caches patterns across reviews for smarter feedback
          enable-memory: 'true'
        # Remove continue-on-error to make review failures block the PR
        continue-on-error: true
