name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile

      # Dependency audit — runs BEFORE build/test so a fresh CVE in the
      # tree surfaces even when an unrelated test happens to be flaky.
      # The threshold is "high" so noisy moderate/low advisories do not
      # break the build. Audit (2026-05-17) flagged the previous ordering.
      - name: pnpm audit (high+)
        run: pnpm audit --audit-level=high

      - run: pnpm build
      - run: pnpm test
      - run: pnpm package:check

      # ─── Dogfooding: javi-forge must use its own tools on itself ──────
      # Without this we'd be a security tool that doesn't eat its own
      # cooking. Audit 2026-05-17 flagged this as a credibility issue.

      # Hook regression suite — proves the commit-msg blocker is alive and
      # matches what's declared in commit-msg.test.sh.
      - name: Run commit-msg hook regression suite
        run: pnpm test:hooks

      # Self-CI — exercises javi-forge's own ci pipeline against itself
      # (stack detection, build, tests, security scan). We install from
      # `npm pack` rather than `npm install -g .` so the runner exercises
      # the same tarball that end users will receive — `--silent` on a
      # source install used to hide a stale local cache picking up a
      # different version. --no-docker keeps the runtime under the
      # runner's quota; --no-ci-ghagga avoids a cyclic dependency on the
      # ghagga binary in this repo.
      - name: Self-CI (javi-forge ci --quick from packed tarball)
        run: |
          set -euo pipefail
          npm pack
          npm install -g ./javi-forge-*.tgz
          rm -f ./javi-forge-*.tgz
          javi-forge ci --quick --no-docker --no-ci-ghagga
