<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>javi-forge — Project Scaffolding</title>
  <meta name="description" content="AI-ready CI bootstrap with templates for Go, Java, Node, Python, Rust" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root {
      --theme-color: #f97316;
      --theme-color-dark: #ea580c;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .sidebar { background: #1c1917; color: #e7e5e4; }
    .sidebar ul li a { color: #a8a29e !important; }
    .sidebar ul li a:hover,
    .sidebar ul li.active > a { color: #f97316 !important; font-weight: 600; }
    .sidebar .sidebar-nav > ul > li > a { font-weight: 700; color: #e7e5e4 !important; }
    .app-name-link { color: #f97316 !important; }
    .markdown-section a { color: var(--theme-color); }
    .markdown-section a:hover { color: var(--theme-color-dark); }
    .markdown-section code { color: #f97316; }
    .markdown-section table { border-collapse: collapse; width: 100%; }
    .markdown-section table th { background: #f5f5f4; }
    .copy-code-button { background: #f97316 !important; }

    /* Dark mode */
    body.dark { background: #1c1917; color: #e7e5e4; }
    body.dark .markdown-section { color: #e7e5e4; }
    body.dark .markdown-section h1,
    body.dark .markdown-section h2,
    body.dark .markdown-section h3 { color: #fafaf9; }
    body.dark .markdown-section code { background: #292524; color: #fb923c; }
    body.dark .markdown-section pre { background: #292524 !important; }
    body.dark .markdown-section table th { background: #292524; color: #e7e5e4; }
    body.dark .markdown-section table td { border-color: #44403c; }
    body.dark .sidebar { background: #0c0a09; }
    body.dark .search input { background: #292524; color: #e7e5e4; border-color: #44403c; }

    /* Dark mode toggle */
    .dark-toggle {
      position: fixed; bottom: 20px; right: 20px; z-index: 999;
      width: 40px; height: 40px; border-radius: 50%;
      background: #f97316; color: #fff; border: none; cursor: pointer;
      font-size: 18px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .dark-toggle:hover { background: #ea580c; }
  </style>
</head>
<body>
  <div id="app"></div>
  <button class="dark-toggle" onclick="document.body.classList.toggle('dark')" title="Toggle dark mode">🌙</button>

  <script>
    window.$docsify = {
      name: 'javi-forge',
      repo: 'https://github.com/JNZader/javi-forge',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: 'Search docs...',
        noData: 'No results',
        depth: 3,
      },
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied!',
      },
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });
    const observer = new MutationObserver(() => {
      document.querySelectorAll('.mermaid').forEach((el, i) => {
        if (el.getAttribute('data-processed')) return;
        try { mermaid.run({ nodes: [el] }); } catch(e) {}
      });
    });
    observer.observe(document.getElementById('app'), { childList: true, subtree: true });
  </script>
</body>
</html>
