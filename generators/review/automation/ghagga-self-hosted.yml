# GHAGGA Code Review — Self-hosted mode
# Generated by javi-forge / generator.review.automation --review-mode self-hosted
#
# This workflow triggers your self-hosted GHAGGA server to review pull requests.
# See: https://github.com/JNZader/ghagga (Option 3: Self-Hosted)
#
# Required setup:
#   1. Deploy a GHAGGA server (see docker-compose.yml in the ghagga repo)
#   2. Install the GHAGGA GitHub App on your repository
#   3. Set GHAGGA_SERVER_URL in your repository secrets
#
# The GHAGGA server receives the PR webhook automatically when the App is installed.
# This workflow provides an on-demand re-trigger for existing PRs.

name: Request GHAGGA Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read

jobs:
  trigger-review:
    name: Trigger Self-hosted GHAGGA Review
    runs-on: ubuntu-latest
    # For issue_comment: only trigger on PR comments containing 'ghagga review'
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, 'ghagga review'))
    steps:
      - name: Determine PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger GHAGGA self-hosted review
        run: |
          # POST to your self-hosted GHAGGA server's re-trigger endpoint.
          # Replace GHAGGA_SERVER_URL with your actual server URL in repository secrets.
          curl -f -X POST "${{ secrets.GHAGGA_SERVER_URL }}/api/review/trigger" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GHAGGA_API_TOKEN }}" \
            -d '{
              "repository": "${{ github.repository }}",
              "pr_number": ${{ steps.pr.outputs.number }},
              "sha": "${{ github.sha }}"
            }' \
            --max-time 30 \
            --retry 2 || echo "GHAGGA server unavailable — review will be retried via webhook"
