kind: forge-template
contract_version: 0.1.0
template:
  id: template.docs.base
  owner_repo: javi-forge
  status: slice-cutover-complete
  milestone: forge-slice-expansion
  family: docs
  supported_stacks:
    - docs
  assets:
    - path: github/ci-docs.yml
      role: MkDocs build and GitHub Pages deploy workflow
    - path: mkdocs.yml.example
      role: MkDocs configuration example (rename to mkdocs.yml)
    - path: dependabot/header.yml
      role: Dependabot base header fragment
    - path: dependabot/github-actions.yml
      role: Dependabot GitHub Actions update fragment
  bootstrap_dependencies: []
  lineage:
    reference_sources:
      - https://github.com/JNZader-Vault/project-starter-framework/tree/main/templates/github
    source_type: curated-delta
    maintenance_owner: javi-forge
    active_external_dependency: none
    cutover_status: forge-slice-expansion-complete
    extraction_status: slice-forge-expansion
  rules:
    - generation happens only through scripts/forge-init.sh
    - docs templates do not include ci-local bootstrap by default; add it separately if needed
    - the CI workflow uses MkDocs with mkdocs-material; consumers adapt mkdocs.yml.example for their site
  notes:
    - forge-slice-expansion implemented the first docs slice.
    - javi-forge-completion upgraded from placeholder stubs to real MkDocs wiring with mkdocs-material.
