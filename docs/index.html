<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>javi-forge — Project Scaffolding</title>
  <meta name="description" content="Generate production-ready CI pipelines, GitHub Actions workflows, and AI code review automation for any stack — in seconds.">

  <!-- Docsify theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">

  <style>
    :root {
      --theme-color: #f97316;
      --sidebar-width: 260px;
      --content-max-width: 900px;
    }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      :root {
        --base-background-color: #0f172a;
        --base-color: #e2e8f0;
        --sidebar-background: #1e293b;
        --sidebar-nav-link-color: #94a3b8;
        --sidebar-nav-link-color--active: #f97316;
        --code-theme-background: #1e293b;
        --code-theme-text: #e2e8f0;
        --mono-color: #94a3b8;
      }
    }

    /* Mermaid diagram centering */
    .mermaid {
      text-align: center;
      margin: 1.5rem 0;
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>

  <script>
    window.$docsify = {
      name: 'javi-forge',
      repo: 'https://github.com/JNZader/javi-forge',
      homepage: 'README.md',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,

      // Search
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search docs...',
        noData: 'No results found.',
        depth: 3
      },

      // Copy code
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied!'
      },

      // Mermaid
      mermaid: {
        theme: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'default',
        startOnLoad: true
      },

      // Pagination
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
        crossChapterText: true
      },

      // Count
      count: {
        countable: true,
        fontsize: '0.9em',
        color: 'rgb(90,90,90)',
        language: 'english'
      },

      // Tabs
      tabs: {
        persist: true,
        sync: true,
        theme: 'classic',
        tabComments: true,
        tabHeadings: true
      }
    }
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1/dist/docsify-tabs.min.js"></script>

  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@2/dist/docsify-mermaid.js"></script>

  <!-- Prism syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
