kind: forge-catalog
contract_version: 0.1.0
status: published
catalog_status:
  work_item: WI-024
  phase: 5
  wave: 6
  scope: publish stable identifiers, extract the first bounded forge slice, and publish optional AI integration mapping
  follow_up:
    - WI-024 published optional project-facing AI integration mappings in docs/contracts/ai-integrations.yaml
    - WI-028 may retire legacy/template notes as the authoritative home
namespace:
  template_prefix: template.
  generator_prefix: generator.
  rules:
    - published IDs are stable contract names inside contract_version 0.1.0
    - consumers must depend on IDs and documented fields only
    - IDs must remain independent from internal templates, scripts, or ci layout
templates:
  - id: template.web.base
    type: template
    supported_stacks_or_modes:
      - web
    required_runtime_prerequisites:
      - git
      - shell
      - template-specific toolchain
    contract_version: 0.1.0
    status: slice-extracted
    owning_repo: javi-forge
    intended_slice: first-class web project baseline
    implementation_manifest: templates/web/base/template.yaml
  - id: template.api.base
    type: template
    supported_stacks_or_modes:
      - api
    required_runtime_prerequisites:
      - git
      - shell
      - template-specific toolchain
    contract_version: 0.1.0
    status: identifier-published
    owning_repo: javi-forge
    intended_slice: first-class api project baseline
  - id: template.fullstack.base
    type: template
    supported_stacks_or_modes:
      - fullstack
    required_runtime_prerequisites:
      - git
      - shell
      - template-specific toolchain
    contract_version: 0.1.0
    status: identifier-published
    owning_repo: javi-forge
    intended_slice: first-class fullstack project baseline
  - id: template.docs.base
    type: template
    supported_stacks_or_modes:
      - docs
    required_runtime_prerequisites:
      - git
      - shell
    contract_version: 0.1.0
    status: identifier-published
    owning_repo: javi-forge
    intended_slice: documentation-focused project baseline
generators:
  - id: generator.project.init
    type: generator
    supported_stacks_or_modes:
      - multi-stack
      - interactive-init
    required_runtime_prerequisites:
      - git
      - shell
    contract_version: 0.1.0
    status: slice-extracted
    owning_repo: javi-forge
    intended_entrypoint: scripts/forge-init.sh
    intended_slice: stable init-project generator surface
  - id: generator.ci.bootstrap
    type: generator
    supported_stacks_or_modes:
      - reusable-ci
      - project-bootstrap-assets
    required_runtime_prerequisites:
      - git
      - shell
    contract_version: 0.1.0
    status: slice-extracted
    owning_repo: javi-forge
    intended_slice: CI and bootstrap asset generation family
    implementation_manifest: ci/bootstrap/ci-local/family.yaml
  - id: generator.review.automation
    type: generator
    supported_stacks_or_modes:
      - review-automation
      - static-analysis
    required_runtime_prerequisites:
      - git
      - shell
    contract_version: 0.1.0
    status: identifier-published
    owning_repo: javi-forge
    intended_slice: review automation and analysis generation family
entrypoints:
  - id: entrypoint.forge.init
    path: scripts/forge-init.sh
    contract_version: 0.1.0
    status: implemented
    owning_repo: javi-forge
    purpose: stable project initialization surface
    supported_generators:
      - generator.project.init
    supported_templates:
      - template.web.base
    invocation_contract:
      required_options:
        - --template
        - --project-name
      optional_options:
        - --generator
        - --destination
        - --stack
        - --contract-version
        - --dry-run
        - --list-contracts
      default_generator: generator.project.init
    rules:
      - consumers invoke this wrapper instead of template-internal scripts
      - the wrapper path stays stable if templates, ci, or internal script layout changes
      - request validation is part of the public contract and the first bounded implementation slice lands in WI-023
catalog_contract:
  required_fields:
    - id
    - type
    - supported_stacks_or_modes
    - required_runtime_prerequisites
    - contract_version
  optional_fields:
    - status
    - owning_repo
    - intended_entrypoint
    - intended_slice
    - entrypoints
