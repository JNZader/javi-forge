name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up environment
        run: |
          # Stack-specific setup goes here.
          # For Node: actions/setup-node; for Java: actions/setup-java, etc.
          echo "environment ready"

      - name: Install dependencies
        run: |
          # Replace with stack-specific install command:
          # npm ci | ./gradlew dependencies | pip install -r requirements.txt | go mod download
          echo "dependencies installed"

      - name: Lint
        run: |
          # Replace with stack-specific lint:
          # npm run lint | ./gradlew spotlessCheck | ruff check . | golangci-lint run
          echo "lint passed"

      - name: Test
        run: |
          # Replace with stack-specific test:
          # npm test | ./gradlew test | pytest | go test ./...
          echo "tests passed"

      - name: Build
        run: |
          # Replace with stack-specific build:
          # npm run build | ./gradlew build | go build ./... | cargo build --release
          echo "build succeeded"
